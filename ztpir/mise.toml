[tasks.audit]
run = "cargo audit"

[tasks.build]
run = "cargo build"

[tasks.check]
run = "cargo check"

[tasks.clippy]
run = "cargo clippy"

[tasks.coverage]
run = "cargo llvm-cov"

[tasks.fmt]
run = "cargo fmt"

[tasks.test]
run = "cargo test"

[tasks.lint]
depends = ["fmt", "check", "clippy"]

[tasks.ci]
depends = ["audit", "lint"]
# this is the only way to run a bunch of dependencies blocking and in order
run = "mise run coverage && mise run build -- --release --locked"
